  # Server distribution (total: 32 hosts)
  # Based on SPEC power_ssj2008 real server data:

  host_count_low_power: 10      # HP ProLiant DL360 G7
                                 # - 8 cores, 32GB RAM
                                 # - Idle: 58W, Peak: 208W
                                 # - Energy efficient for light workloads

  host_count_medium: 12          # Dell PowerEdge R720
                                 # - 16 cores, 64GB RAM
                                 # - Idle: 98W, Peak: 345W
                                 # - Balanced performance

  host_count_high_perf: 8        # Cisco UCS C240 M4
                                 # - 24 cores, 128GB RAM
                                 # - Idle: 142W, Peak: 476W
                                 # - High performance for heavy tasks

