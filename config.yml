  n_epochs: 15
  gamma: 0.995
  gae_lambda: 0.98
  ent_coef: 0.05

  # 🌟 HETEROGENEOUS HOSTS CONFIGURATION 🌟
  # Enable heterogeneous datacenter with real server profiles
